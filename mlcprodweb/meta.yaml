id: "mlc-tester"
name: "MCP-Tester"
version: "0.2.3"
status: "stable"
category: "MCP Tools"
license: "MIT"
platforms: [Windows, macOS, Linux]
screenshots:
  - "mcp-tester-screenshot.png"

slogan_en: "Connect to any MCP server, explore its tools and resources, and validate spec compliance — all from the terminal."
slogan_de: "Mit jedem MCP-Server verbinden, Tools und Resources erkunden, Spec-Konformität prüfen — alles im Terminal."

features:
  - icon: "terminal"
    title_en: "Test Any MCP Server"
    title_de: "Jeden MCP-Server testen"
    desc_en: "Connect to any stdio or SSE server with a single command. No config file needed for a quick check."
    desc_de: "Mit einem einzigen Befehl zu jedem stdio- oder SSE-Server verbinden. Für schnelle Checks kein Konfigurationsfile nötig."
  - icon: "search"
    title_en: "Inspector & Quality Score"
    title_de: "Inspektor & Quality Score"
    desc_en: "Analyzes your server for spec compliance, metadata quality, and best practices — returns a concrete score with actionable findings."
    desc_de: "Analysiert den Server auf Spec-Konformität, Metadaten-Qualität und Best Practices — liefert einen konkreten Score mit Handlungsempfehlungen."
  - icon: "check-circle"
    title_en: "Automated Test Scripts"
    title_de: "Automatisierte Test-Skripte"
    desc_en: "Write .mcp scripts with variables, assertions, and multi-step workflows for regression testing and CI pipelines."
    desc_de: ".mcp-Skripte mit Variablen, Assertions und mehrstufigen Workflows für Regressionstests und CI-Pipelines schreiben."
  - icon: "layers"
    title_en: "Profile Management"
    title_de: "Profilverwaltung"
    desc_en: "Manage multiple servers in mcp-tester.yml — switch between local build, staging, and production with a single flag."
    desc_de: "Mehrere Server in mcp-tester.yml verwalten — mit einem Flag zwischen lokalem Build, Staging und Produktion wechseln."

downloads:
  free: true
  files:
    - os: "Windows"
      arch: "x64"
      label_en: "Windows Installer (AMD64)"
      label_de: "Windows-Installer (AMD64)"
      file: "mcp-tester-setup-v0.2.3-windows-amd64.exe"
    - os: "Linux"
      arch: "x86_64"
      label_en: "Linux AMD64"
      label_de: "Linux AMD64"
      file: "https://mlcgo.eu/downloads/mlc-tester/mcp-tester-linux-amd64"
    - os: "macOS"
      arch: "Apple Silicon"
      label_en: "macOS (Apple Silicon)"
      label_de: "macOS (Apple Silicon)"
      file: "https://mlcgo.eu/downloads/mlc-tester/mcp-tester-macos-arm64"
    - os: "macOS"
      arch: "Intel"
      label_en: "macOS (Intel)"
      label_de: "macOS (Intel)"
      file: "https://mlcgo.eu/downloads/mlc-tester/mcp-tester-macos-amd64"
