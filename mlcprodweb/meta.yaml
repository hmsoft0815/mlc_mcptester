id: "mlc-tester"
name: "MCP-Tester"
version: "0.2.3"
status: "stable"
category: "Development Tools"
license: "MIT"
platforms: [Windows, macOS, Linux]
slogan_en: "A comprehensive CLI tool for testing, debugging, and validating MCP servers."
slogan_de: "Ein umfassendes Kommandozeilen-Tool zum Testen, Debuggen und Validieren von MCP-Servern."

features:
  - icon: "check-circle"
    title_en: "Specification Compliance"
    title_de: "Standardkonformität"
    desc_en: "Validates servers against the 2025-11-25 MCP specification."
    desc_de: "Validiert Server gegen die MCP-Spezifikation vom 25.11.2025."
  - icon: "terminal"
    title_en: "Interactive Scripting"
    title_de: "Interaktives Scripting"
    desc_en: "Automate complex test workflows with a specialized scripting grammar."
    desc_de: "Automatisieren Sie komplexe Testabläufe mit einer spezialisierten Scripting-Grammatik."
  - icon: "search"
    title_en: "Server Inspector"
    title_de: "Server-Inspektor"
    desc_en: "Analyzes servers for best practices and provides a detailed quality score."
    desc_de: "Analysiert Server auf Best Practices und liefert einen detaillierten Quality Score."
  - icon: "zap"
    title_en: "Multi-Transport Support"
    title_de: "Multi-Transport-Unterstützung"
    desc_en: "Supports both local stdio processes and remote SSE servers."
    desc_de: "Unterstützt sowohl lokale stdio-Prozesse als auch entfernte SSE-Server."

downloads:
  free: true
  files:
    - os: "Windows"
      arch: "x64"
      label_en: "Windows AMD64"
      label_de: "Windows AMD64"
      file: "https://mlcgo.eu/downloads/mlc-tester/mcp-tester-windows-amd64.exe"
    - os: "Linux"
      arch: "x86_64"
      label_en: "Linux AMD64"
      label_de: "Linux AMD64"
      file: "https://mlcgo.eu/downloads/mlc-tester/mcp-tester-linux-amd64"
    - os: "macOS"
      arch: "Apple Silicon"
      label_en: "macOS (Apple Silicon)"
      label_de: "macOS (Apple Silicon)"
      file: "https://mlcgo.eu/downloads/mlc-tester/mcp-tester-macos-arm64"
    - os: "macOS"
      arch: "Intel"
      label_en: "macOS (Intel)"
      label_de: "macOS (Intel)"
      file: "https://mlcgo.eu/downloads/mlc-tester/mcp-tester-macos-amd64"
